# Week 2 — enable after Dockerfiles exist
services:
  api:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    volumes:
      - ../backend/artifacts:/app/artifacts

  web:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.web
    ports:
      - "5173:80"
    depends_on:
      - api
